# ─────────────────────────────────────────────────────────────
# WhatsApp Chatbot - Spring Boot Configuration
# ─────────────────────────────────────────────────────────────

# Server
server.port=8080

# Application Info
spring.application.name=whatsapp-chatbot

# Logging
logging.level.com.chatbot=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator (for health checks on Render/deployment)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=WhatsApp Chatbot Backend
info.app.version=1.0.0
info.app.author=Spring Boot Internship Assignment
